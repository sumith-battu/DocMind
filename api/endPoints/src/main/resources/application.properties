spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:docintel}
spring.datasource.username=${DB_USER:docuser}
spring.datasource.password=${DB_PASSWORD:docpass}
spring.jpa.hibernate.ddl-auto=validate

aws.s3.endpoint=${AWS_ENDPOINT_URL:http://localhost:4566}
aws.s3.region=${AWS_REGION:us-east-1}
aws.s3.bucket=${S3_BUCKET:docmind-documents}
aws.access-key=${AWS_ACCESS_KEY_ID:test}
aws.secret-key=${AWS_SECRET_ACCESS_KEY:test}

embedding.service.url=${EMBEDDING_SERVICE_URL:http://localhost:6060}

groq.api.url=${GROQ_API_URL:https://api.groq.com/openai/v1}
groq.api.key=${GROQ_API_KEY}
groq.model=${GROQ_MODEL:llama-3.3-70b-versatile}